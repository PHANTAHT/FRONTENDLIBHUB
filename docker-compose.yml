services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pustaka_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: pustaka
      DB_USERNAME: pustaka_user
      DB_PASSWORD: secret
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_ENCRYPTION: null
      MAIL_FROM_ADDRESS: noreply@pustaka.test
      MAIL_FROM_NAME: LibHub
    depends_on:
      - db
    networks:
      - pustaka_network

  nginx:
    image: nginx:alpine
    container_name: pustaka_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - pustaka_network

  db:
    image: mysql:8.0
    container_name: pustaka_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pustaka
      MYSQL_USER: pustaka_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3307:3306"
    volumes:
      - pustaka_db_data:/var/lib/mysql
    networks:
      - pustaka_network

  mailpit:
    image: axllent/mailpit
    container_name: pustaka_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - pustaka_network

networks:
  pustaka_network:
    driver: bridge

volumes:
  pustaka_db_data:
    driver: local